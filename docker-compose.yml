services:
  db:
    image: mariadb:10.6
    container_name: vinted-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: vinted_monitor
      MARIADB_USER: monitor_user
      MARIADB_PASSWORD: monitor_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: vinted-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: vinted-api
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=mysql://monitor_user:monitor_password@db:3306/vinted_monitor
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - db
      - redis

  worker:
    build: ./worker
    container_name: vinted-worker
    restart: always
    volumes:
      - ./worker:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3000
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - api

  frontend:
    build: ./frontend
    container_name: vinted-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - api

volumes:
  db_data:
